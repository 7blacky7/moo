name: tokens-check

on:
  pull_request:
    paths:
      - "spec/tokens.yaml"
      - "compiler/src/tokens.rs"
      - "src/moo/tokens.py"
      - "tools/check_tokens.py"
      - ".github/workflows/tokens-check.yml"
  push:
    branches: [master, main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify token spec against implementations
        run: python3 tools/check_tokens.py
