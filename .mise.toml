  *) TARGET="$PWD/$TARGET" ;;
esac
COMPILER="$TARGET/release/moo-compiler"
cp beispiele/tests/ui_moo_surface_primitives_test.moos "$OUT/primitives.moos"
cp beispiele/tests/ui_moo_surface_golden_test.moos "$OUT/golden.moos"
"$COMPILER" compile "$OUT/primitives.moos" -o "$OUT/primitives"
"$OUT/primitives"
"$COMPILER" compile "$OUT/golden.moos" -o "$OUT/golden"
