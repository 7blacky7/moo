[tasks.test-ui-moo-ime-event-contract]
description = "Run the toolkit-free ui_moo IME event value contract"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-ime-event.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
COMPILER="$PWD/compiler/target/release/moo-compiler"
test -x "$COMPILER"
"$COMPILER" compile beispiele/tests/ui_moo_ime_event_contract_test.moos -o "$OUT/ime-event"
env -u DISPLAY -u WAYLAND_DISPLAY -u XDG_RUNTIME_DIR -u DBUS_SESSION_BUS_ADDRESS -u PULSE_SERVER -u PIPEWIRE_REMOTE -u XAUTHORITY -u MIR_SOCKET -u SWAYSOCK "$OUT/ime-event" >"$OUT/ime-event.log" 2>"$OUT/ime-event.err"
test ! -s "$OUT/ime-event.err"
test "$(grep -c '^PASS ' "$OUT/ime-event.log")" -eq 18
test "$(grep -c '^FAIL ' "$OUT/ime-event.log")" -eq 0
test "$(grep -c '^P016-O4-MOO-IME-EVENT-OK checks=18 offsets=utf8-bytes no_ui=1$' "$OUT/ime-event.log")" -eq 1
cat "$OUT/ime-event.log"
'''
