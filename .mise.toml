[tasks.test-ui-moo-effects-portable]
description = "Run Moo compositor effects with GCC and Clang at O0, O2 and O3"
run = '''
set -eu
for cc in gcc clang; do
  if ! command -v "$cc" >/dev/null 2>&1; then
    echo "P016-G1 COMPILER N/A: $cc unavailable" >&2
    exit 2
  fi
  for opt in O0 O2 O3; do
    CC="$cc" EFFECTS_SANITIZER=none EFFECTS_OPT_LEVEL="$opt" bash scripts/effects-test-runner.sh verify-green
  done
done
'''

[tasks.test-ui-moo-effects-freestanding]
description = "Prove the Moo compositor effects stack is freestanding and self-contained"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-effects-freestanding.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
for cc in ${CC:-gcc clang}; do
  if ! command -v "$cc" >/dev/null 2>&1; then
    echo "P016-G1 FREESTANDING N/A: $cc unavailable" >&2
    exit 2
  fi
  CC_OUT="$OUT/$cc"
  mkdir -p "$CC_OUT"
  for src in \
    moo_freestanding_mem.c \
    moo_compositor_core.c \
    moo_compositor_raster.c \
    moo_compositor_effects_state.c \
    moo_compositor_animation.c \
    moo_compositor_effects_math.c \
    moo_compositor_effects_cpu.c \
    moo_compositor_effects_damage.c \
    moo_compositor_effects_gpu.c; do
    "$cc" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector \
      -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -pedantic -O2 \
      -Icompiler/runtime -c "compiler/runtime/$src" -o "$CC_OUT/${src%.c}.o"
  done
  "$cc" -nostdlib -r "$CC_OUT"/*.o -o "$CC_OUT/effects-stack.o"
  undefined="$(nm -u "$CC_OUT/effects-stack.o")"
  if [ -n "$undefined" ]; then
    echo "P016-G1 FREESTANDING FAIL: cc=$cc undefined symbols" >&2
    echo "$undefined" >&2
    exit 1
  fi
  echo "P016-G1 FREESTANDING PASS: cc=$cc undefined=0"
done
'''

[tasks.test-ui-moo-effects-ilp32]
description = "Compile and close the Moo compositor effects stack as ILP32"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-effects-ilp32.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
for cc in gcc clang; do
  if ! command -v "$cc" >/dev/null 2>&1; then
    echo "P016-G1 ILP32 N/A: $cc unavailable" >&2
    exit 2
  fi
  CC_OUT="$OUT/$cc"
  mkdir -p "$CC_OUT"
  for src in \
    moo_freestanding_mem.c \
    moo_compositor_core.c \
    moo_compositor_raster.c \
    moo_compositor_effects_state.c \
    moo_compositor_animation.c \
    moo_compositor_effects_math.c \
    moo_compositor_effects_cpu.c \
    moo_compositor_effects_damage.c \
    moo_compositor_effects_gpu.c; do
    "$cc" -m32 -std=c11 -ffreestanding -fno-builtin -fno-pic -fno-pie \
      -fno-stack-protector -fno-asynchronous-unwind-tables \
      -Wall -Wextra -Werror -pedantic -O2 \
      -Icompiler/runtime -c "compiler/runtime/$src" -o "$CC_OUT/${src%.c}.o"
  done
  compiler_runtime="$("$cc" -m32 -print-libgcc-file-name)"
  if [ ! -f "$compiler_runtime" ]; then
    echo "P016-G1 ILP32 N/A: cc=$cc compiler-runtime missing: $compiler_runtime" >&2
    exit 2
  fi
  "$cc" -m32 -nostdlib -r "$CC_OUT"/*.o "$compiler_runtime" \
    -o "$CC_OUT/effects-stack.o"
  object_kind="$(file "$CC_OUT/effects-stack.o")"
  case "$object_kind" in
    *"ELF 32-bit"*) ;;
    *) echo "P016-G1 ILP32 FAIL: cc=$cc object=$object_kind" >&2; exit 1 ;;
  esac
  undefined="$(nm -u "$CC_OUT/effects-stack.o")"
  if [ -n "$undefined" ]; then
    echo "P016-G1 ILP32 FAIL: cc=$cc undefined symbols" >&2
    echo "$undefined" >&2
    exit 1
  fi
  echo "P016-G1 ILP32 PASS: cc=$cc object=ELF32 undefined=0"
done
'''

