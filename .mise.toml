MOO_GLASS_GALLERY_NON_UI=1 MOO_GLASS_GALLERY_BMP="$OUT/gallery.bmp" "$OUT/gallery"
test -s "$OUT/gallery.bmp"
'''

[tasks.test-ui-moo-compositor]
description = "Run toolkit-free Moo compositor sanitizer and freestanding gates"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-compositor.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
CC="${CC:-cc}"
SRC="compiler/runtime/tests/test_compositor_asan.c compiler/runtime/moo_ui_host_parity_instrumentation.c compiler/runtime/moo_compositor_core.c compiler/runtime/moo_compositor_raster.c compiler/runtime/moo_compositor_effects_state.c compiler/runtime/moo_compositor_animation.c compiler/runtime/moo_compositor_effects_math.c compiler/runtime/moo_compositor_effects_cpu.c compiler/runtime/moo_compositor_effects_damage.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/compositor-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/compositor-asan"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/compositor-ubsan"
UBSAN_OPTIONS=halt_on_error=1 "$OUT/compositor-ubsan"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_freestanding_mem.c -o "$OUT/freestanding-mem.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_core.c -o "$OUT/core.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_raster.c -o "$OUT/raster.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_effects_state.c -o "$OUT/effects-state.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_animation.c -o "$OUT/animation.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_effects_math.c -o "$OUT/effects-math.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_effects_cpu.c -o "$OUT/effects-cpu.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_effects_damage.c -o "$OUT/effects-damage.o"
"$CC" -nostdlib -r "$OUT/freestanding-mem.o" "$OUT/core.o" "$OUT/raster.o" "$OUT/effects-state.o" "$OUT/animation.o" "$OUT/effects-math.o" "$OUT/effects-cpu.o" "$OUT/effects-damage.o" -o "$OUT/compositor.o"
test -z "$(nm -u "$OUT/compositor.o")"
'''


