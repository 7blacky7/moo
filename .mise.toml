[tools]
python = "3.13"

[tasks.dev]
description = "Run moo REPL"
run = "uv run python -m moo"

[tasks.test]
description = "Run tests"
run = "uv run pytest tests/ -v"

[tasks.run]
description = "Run a .moo file"
run = "uv run python -m moo run"

[tasks.test-compiler]
description = "Run compiler test suite"
run = "bash compiler/tests/run_all.sh"

[tasks.test-ui]
description = "Run visual UI tests in the isolated harness"
run = "bash scripts/ui-test-runner.sh"

[tasks.test-ui-moo-demo]
description = "Run the ui_moo demo 20 times in the isolated harness"
run = "bash scripts/ui-moo-demo-smoke.sh"
