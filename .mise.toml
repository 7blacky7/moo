[tools]
python = "3.13"

[tasks.dev]
description = "Run moo REPL"
run = "uv run python -m moo"

[tasks.test]
description = "Run tests"
run = "uv run pytest tests/ -v"

[tasks.run]
description = "Run a .moos file"
run = "uv run python -m moo run"

[tasks.test-compiler]
description = "Run compiler test suite"
run = "bash compiler/tests/run_all.sh"

[tasks.test-ui]
description = "Run visual UI tests in the isolated harness"
run = "bash scripts/ui-test-runner.sh"

[tasks.test-ui-moo-demo]
description = "Run the ui_moo demo 20 times in the isolated harness"
run = "bash scripts/ui-moo-demo-smoke.sh"

[tasks.test-ui-moo-lifecycle]
description = "Run the toolkit-free headless ui_moo lifecycle and callback ownership gates"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-ui-moo-lifecycle.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
cargo build --release --manifest-path compiler/Cargo.toml
TARGET="${CARGO_TARGET_DIR:-$PWD/compiler/target}"
case "$TARGET" in
  /*) ;;
  *) TARGET="$PWD/$TARGET" ;;
esac
COMPILER="$TARGET/release/moo-compiler"
"$COMPILER" compile beispiele/tests/ui_moo_lifecycle_test.moos -o "$OUT/lifecycle"
env -u DISPLAY -u WAYLAND_DISPLAY -u XDG_RUNTIME_DIR -u DBUS_SESSION_BUS_ADDRESS \
    -u PULSE_SERVER -u PIPEWIRE_REMOTE -u XAUTHORITY \
    MOO_UI_BACKEND=gtk "$OUT/lifecycle"
'''


