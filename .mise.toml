[tasks.test-ui-moo-a11y-metadata]
description = "Run the toolkit-free ui_moo accessibility metadata contract"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-a11y-metadata.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
COMPILER="$PWD/compiler/target/release/moo-compiler"
test -x "$COMPILER"
"$COMPILER" compile beispiele/tests/ui_moo_a11y_metadata_test.moos -o "$OUT/a11y-metadata"
env -u DISPLAY -u WAYLAND_DISPLAY -u XDG_RUNTIME_DIR -u DBUS_SESSION_BUS_ADDRESS -u PULSE_SERVER -u PIPEWIRE_REMOTE -u XAUTHORITY -u MIR_SOCKET -u SWAYSOCK "$OUT/a11y-metadata" >"$OUT/a11y-metadata.log" 2>"$OUT/a11y-metadata.err"
test ! -s "$OUT/a11y-metadata.err"
test "$(grep -c '^PASS ' "$OUT/a11y-metadata.log")" -eq 14
test "$(grep -c '^FAIL ' "$OUT/a11y-metadata.log")" -eq 0
test "$(grep -c '^P016-O4-MOO-A11Y-OK checks=14 no_ui=1$' "$OUT/a11y-metadata.log")" -eq 1
cat "$OUT/a11y-metadata.log"
'''


[tasks.test-ui-moo-input]
description = "Run toolkit-free Moo input, IME and accessibility gates"
run = '''
set -eu
mise run test-ui-moo-a11y-metadata
mise run test-ui-moo-ime-event-contract
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-input.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
CC="${CC:-cc}"
SRC="compiler/runtime/tests/test_input_a11y_asan.c compiler/runtime/moo_input_core.c compiler/runtime/moo_a11y_core.c compiler/runtime/moo_ui_host_parity_devtools.c compiler/runtime/moo_ui_host_parity_instrumentation.c compiler/runtime/moo_compositor_core.c compiler/runtime/moo_compositor_raster.c compiler/runtime/moo_compositor_effects_state.c compiler/runtime/moo_compositor_animation.c compiler/runtime/moo_compositor_effects_math.c compiler/runtime/moo_compositor_effects_cpu.c compiler/runtime/moo_compositor_effects_damage.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/input-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/input-asan"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/input-ubsan"
UBSAN_OPTIONS=halt_on_error=1 "$OUT/input-ubsan"
BRIDGE_SRC="compiler/runtime/tests/test_input_compositor_bridge.c compiler/runtime/moo_input_compositor_bridge.c compiler/runtime/moo_input_core.c compiler/runtime/moo_compositor_core.c compiler/runtime/moo_compositor_raster.c compiler/runtime/moo_compositor_effects_state.c compiler/runtime/moo_compositor_animation.c compiler/runtime/moo_compositor_effects_math.c compiler/runtime/moo_compositor_effects_cpu.c compiler/runtime/moo_compositor_effects_damage.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $BRIDGE_SRC -o "$OUT/bridge-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/bridge-asan"
TRACE_SRC="compiler/runtime/tests/test_input_trace.c compiler/runtime/moo_input_core.c compiler/runtime/moo_a11y_core.c"
"$CC" -std=c11 -O2 -Wall -Wextra -Werror -fsanitize=address,undefined -fno-omit-frame-pointer -Icompiler/runtime $TRACE_SRC -o "$OUT/trace-sanitize"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1 "$OUT/trace-sanitize"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_input_core.c -o "$OUT/input.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_a11y_core.c -o "$OUT/a11y.o"
"$CC" -nostdlib -r "$OUT/input.o" "$OUT/a11y.o" -o "$OUT/input-a11y.o"
test -z "$(nm -u "$OUT/input-a11y.o")"
'''


