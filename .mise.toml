[tools]
python = "3.13"

[tasks.dev]
description = "Run moo REPL"
run = "uv run python -m moo"

[tasks.test]
description = "Run tests"
run = "uv run pytest tests/ -v"

[tasks.run]
description = "Run a .moo file"
run = "uv run python -m moo run"

[tasks.test-compiler]
description = "Run compiler test suite"
run = "bash compiler/tests/run_all.sh"

[tasks.test-ui]
description = "Run visual UI tests in the isolated harness"
run = "bash scripts/ui-test-runner.sh"

[tasks.test-ui-moo-demo]
description = "Run the ui_moo demo 20 times in the isolated harness"
run = "bash scripts/ui-moo-demo-smoke.sh"


[tasks.test-ui-moo-surface]
description = "Run toolkit-free ui_moo Surface regression tests"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-ui-moo-surface.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
cargo build --release --manifest-path compiler/Cargo.toml
TARGET="${CARGO_TARGET_DIR:-$PWD/compiler/target}"
case "$TARGET" in
  /*) ;;
  *) TARGET="$PWD/$TARGET" ;;
esac
COMPILER="$TARGET/release/moo-compiler"
cp beispiele/tests/ui_moo_surface_primitives_test.moo "$OUT/primitives.moo"
cp beispiele/tests/ui_moo_surface_golden_test.moo "$OUT/golden.moo"
"$COMPILER" compile "$OUT/primitives.moo" -o "$OUT/primitives"
"$OUT/primitives"
"$COMPILER" compile "$OUT/golden.moo" -o "$OUT/golden"
"$OUT/golden"
'''


[tasks.test-ui-moo-compositor]
description = "Run toolkit-free Moo compositor sanitizer and freestanding gates"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-compositor.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
CC="${CC:-cc}"
SRC="compiler/runtime/tests/test_compositor_asan.c compiler/runtime/moo_compositor_core.c compiler/runtime/moo_compositor_raster.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/compositor-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/compositor-asan"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/compositor-ubsan"
UBSAN_OPTIONS=halt_on_error=1 "$OUT/compositor-ubsan"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_core.c -o "$OUT/core.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_compositor_raster.c -o "$OUT/raster.o"
"$CC" -nostdlib -r "$OUT/core.o" "$OUT/raster.o" -o "$OUT/compositor.o"
test -z "$(nm -u "$OUT/compositor.o")"
'''


[tasks.test-ui-moo-input]
description = "Run toolkit-free Moo input, IME and accessibility gates"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-input.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
CC="${CC:-cc}"
SRC="compiler/runtime/tests/test_input_a11y_asan.c compiler/runtime/moo_input_core.c compiler/runtime/moo_a11y_core.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/input-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/input-asan"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=undefined -fno-sanitize-recover=undefined -fno-omit-frame-pointer -Icompiler/runtime $SRC -o "$OUT/input-ubsan"
UBSAN_OPTIONS=halt_on_error=1 "$OUT/input-ubsan"
BRIDGE_SRC="compiler/runtime/tests/test_input_compositor_bridge.c compiler/runtime/moo_input_compositor_bridge.c compiler/runtime/moo_input_core.c compiler/runtime/moo_compositor_core.c compiler/runtime/moo_compositor_raster.c"
"$CC" -std=c11 -Wall -Wextra -Werror -fsanitize=address -fno-omit-frame-pointer -Icompiler/runtime $BRIDGE_SRC -o "$OUT/bridge-asan"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 "$OUT/bridge-asan"
TRACE_SRC="compiler/runtime/tests/test_input_trace.c compiler/runtime/moo_input_core.c compiler/runtime/moo_a11y_core.c"
"$CC" -std=c11 -O2 -Wall -Wextra -Werror -fsanitize=address,undefined -fno-omit-frame-pointer -Icompiler/runtime $TRACE_SRC -o "$OUT/trace-sanitize"
ASAN_OPTIONS=detect_leaks=1:abort_on_error=1 UBSAN_OPTIONS=halt_on_error=1 "$OUT/trace-sanitize"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_input_core.c -o "$OUT/input.o"
"$CC" -std=c11 -ffreestanding -fno-builtin -fno-stack-protector -fno-asynchronous-unwind-tables -Wall -Wextra -Werror -O2 -Icompiler/runtime -c compiler/runtime/moo_a11y_core.c -o "$OUT/a11y.o"
"$CC" -nostdlib -r "$OUT/input.o" "$OUT/a11y.o" -o "$OUT/input-a11y.o"
test -z "$(nm -u "$OUT/input-a11y.o")"
'''


[tasks.test-ui-moo-input-win32-cross]
description = "Cross-compile the Win32 input/IME adapter contract"
run = '''
set -eu
OUT="$(mktemp -d "${TMPDIR:-/tmp}/moo-input-win32.XXXXXX")"
trap 'rm -rf "$OUT"' EXIT
CC="${MINGW_CC:-x86_64-w64-mingw32-gcc}"
"$CC" -std=c11 -O2 -Wall -Wextra -Werror -Icompiler/runtime   compiler/runtime/tests/test_input_win32.c   compiler/runtime/moo_input_win32.c   compiler/runtime/moo_input_core.c   compiler/runtime/moo_a11y_core.c   -limm32 -o "$OUT/input-win32-test.exe"
file "$OUT/input-win32-test.exe"
'''
