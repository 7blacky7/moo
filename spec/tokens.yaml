    status: active
    variants: ["<<"]
    implementations: [rust]

  - id: RShift
    kind: operator
    status: active
    variants: [">>"]
    implementations: [rust]

  # ─── Arithmetik ────────────────────────────────────────────────────────
  - id: Plus
    kind: operator
    status: active
    variants: ["+"]
    implementations: [rust, python]
  - id: Minus
    kind: operator
    status: active
    variants: ["-"]
    implementations: [rust, python]
  - id: Multiply
    kind: operator
    status: active
    variants: ["*"]
    implementations: [rust, python]
  - id: Divide
    kind: operator
    status: active
    variants: ["/"]
    implementations: [rust, python]
  - id: Modulo
    kind: operator
    status: active
    variants: ["%"]
    implementations: [rust, python]
  - id: Power
    kind: operator
    status: active
    variants: ["**"]
    implementations: [rust, python]
  - id: Range
    kind: operator
    status: active
    variants: [".."]
    implementations: [rust, python]

  # ─── Zuweisungen ───────────────────────────────────────────────────────
  - id: Assign
    kind: operator
    status: active
    variants: ["="]
    implementations: [rust, python]
  - id: PlusAssign
    kind: operator
    status: active
