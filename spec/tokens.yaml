    implementations: [rust, python]
  - id: Spread
    kind: operator
    status: active
    variants: ["..."]
    implementations: [rust, python]
  - id: Question
    kind: operator
    status: active
    variants: ["?"]
    implementations: [rust]
  - id: At
    kind: operator
    status: active
    variants: ["@"]
    implementations: [rust, python]

  # ─── Delimiters ────────────────────────────────────────────────────────
  - id: Colon
    kind: delimiter
    status: active
    variants: [":"]
    implementations: [rust, python]
  - id: Comma
    kind: delimiter
    status: active
    variants: [","]
    implementations: [rust, python]
  - id: LParen
    kind: delimiter
    status: active
    variants: ["("]
    implementations: [rust, python]
  - id: RParen
